events {
    worker_connections 256;
}

http {
    log_format main '$remote_addr - $request - $status - $request_time s';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    upstream auth_backend       { server auth-service:8001; }
    upstream profile_backend    { server profile-service:8002; }
    upstream matcher_backend    { server matcher-service:8003; }
    upstream tracker_backend    { server tracker-service:8004; }
    upstream analytics_backend  { server analytics-service:8005; }

    server {
        listen 80;
        server_name localhost;

        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID" always;
        add_header Access-Control-Expose-Headers "X-Correlation-ID" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "http://localhost:3000";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        client_max_body_size 10M;

        location /api/v1/auth/    { proxy_pass http://auth_backend;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/v1/profile  { proxy_pass http://profile_backend;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/v1/resumes  { proxy_pass http://profile_backend;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/v1/match    { proxy_pass http://matcher_backend;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 30s; }
        location /api/v1/applications { proxy_pass http://tracker_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/v1/analytics { proxy_pass http://analytics_backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        location /health {
            return 200 '{"status": "gateway_alive"}';
            add_header Content-Type application/json;
        }
    }
}